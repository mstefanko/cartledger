name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Go test (race + coverage)
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test (race + coverage)
        run: go test -race -timeout 120s -coverprofile=coverage.out ./...

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          if [ -z "$COVERAGE" ]; then
            echo "Failed to extract coverage" >&2
            exit 1
          fi
          echo "Coverage: ${COVERAGE}%"
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  coverage-ratchet:
    name: Coverage ratchet
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Compare coverage against baseline
        run: |
          set -euo pipefail
          if [ ! -f .github/coverage-baseline ]; then
            echo "Missing .github/coverage-baseline" >&2
            exit 1
          fi
          BASELINE=$(tr -d '[:space:]' < .github/coverage-baseline)
          NEW=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Baseline: ${BASELINE}%"
          echo "Current:  ${NEW}%"
          awk -v new="$NEW" -v base="$BASELINE" 'BEGIN { if (new + 0 < base + 0) { printf "FAIL: coverage %.2f%% is below baseline %.2f%%\n", new, base; exit 1 } else { printf "OK: coverage %.2f%% >= baseline %.2f%%\n", new, base } }'

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: npm run build
        working-directory: web
        run: npm run build
